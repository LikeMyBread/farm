<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Farm - Retro Adventure</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="ui-overlay">
            <div class="header">
                <span id="location-name">THE FARM</span>
                <span id="day-display">DAY 1</span>
            </div>
            <div class="side-log" id="event-log"></div>

            <div id="nav-up" class="nav-arrow" onclick="game.handleNav('up')">↑</div>
            <div id="nav-down" class="nav-arrow" onclick="game.handleNav('down')">↓</div>
            <div id="nav-left" class="nav-arrow" onclick="game.handleNav('left')">←</div>
            <div id="nav-right" class="nav-arrow" onclick="game.handleNav('right')">→</div>

            <div id="morning-report">
                <h2 id="report-title">GOOD MORNING</h2>
                <div id="report-content"></div>
                <button onclick="game.closeReport()">Start Day</button>
            </div>

            <div class="shop-ui" id="shop-container">
                <h3>GENERAL STORE</h3>
                <p>Your Cash: $<span id="cash-display">0</span></p>
                <div id="shop-items"></div>
                <div style="text-align: center; margin-top: 20px; font-size: 12px; color: #FFF;">(CLICK BOTTOM ARROW TO
                    LEAVE)</div>
            </div>

            <div class="energy-container">
                <div id="energy-bar"></div>
                <!-- Tick marks for the thermometer effect -->
                <div class="energy-ticks">
                    <div class="tick major"></div>
                    <div class="tick"></div>
                    <div class="tick"></div>
                    <div class="tick"></div>
                    <div class="tick"></div>
                    <div class="tick major"></div>
                    <div class="tick"></div>
                    <div class="tick"></div>
                    <div class="tick"></div>
                    <div class="tick"></div>
                    <div class="tick major"></div>
                </div>
                <div
                    style="position: absolute; top:0; width:100%; text-align:center; font-size:14px; color:#FFF; mix-blend-mode: difference; font-weight: bold; line-height: 16px;">
                    ENERGY</div>
            </div>

            <div class="inventory-wrapper">
                <div class="inventory-scroll">
                    <div class="scroll-arrow" onclick="game.scrollInventory(-1)">↑</div>
                    <div class="scroll-arrow" onclick="game.scrollInventory(1)">↓</div>
                </div>
                <div class="inventory-viewport">
                    <div class="inventory-bar" id="inventory"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function resizeGame() {
            const scale = Math.min(window.innerWidth / 800, window.innerHeight / 600);
            document.getElementById('game-container').style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeGame);
        resizeGame();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const logEl = document.getElementById('event-log');
        const invEl = document.getElementById('inventory');
        const shopContainer = document.getElementById('shop-container');
        const energyBarEl = document.getElementById('energy-bar');
        const reportEl = document.getElementById('morning-report');
        const reportContentEl = document.getElementById('report-content');

        const CONFIG = {
            gridCols: 8,
            gridRows: 4,
            cellSize: 60,
            offsetX: 220,
            offsetY: 220,
            energyMax: 100,
            costWater: 5,
            costPlant: 10,
            costHarvest: 4
        };

        const CROPS = {
            carrot: { name: 'Carrot', seedChar: '.', midChar: 'c', endChar: 'C', value: 10, seedCost: 2, daysToGrow: 2, restoreEnergy: 15 },
            wheat: { name: 'Wheat', seedChar: '.', midChar: 'w', endChar: 'W', value: 15, seedCost: 4, daysToGrow: 4, restoreEnergy: 20 },
            wood: { name: 'Wood', value: 2 },
            stone: { name: 'Stone', value: 3 }
        };

        class Game {
            constructor() {
                this.location = 'farm';
                this.day = 1;
                this.cash = 10;
                this.energy = CONFIG.energyMax;
                this.inventory = [
                    { id: 'look', name: 'Look', type: 'tool', count: 1 },
                    { id: 'watering_can', name: 'Can', type: 'tool', count: 1 },
                    { id: 'pickaxe', name: 'Pick', type: 'tool', count: 1 },
                    { id: 'axe', name: 'Axe', type: 'tool', count: 1 },
                    { id: 'carrot_seed', name: 'Carrot', type: 'seed', crop: 'carrot', count: 5 },
                    { id: 'wheat_seed', name: 'Wheat', type: 'seed', crop: 'wheat', count: 3 }
                ];
                this.selectedItemIndex = 1;
                this.inventoryScrollRow = 0;
                this.grid = [];
                this.initGrid();
                this.messages = ["Welcome to ASCII Farm."];
                this.isRaining = false;

                this.mouseX = 0;
                this.mouseY = 0;

                this.farmHouseRect = { x: 375, y: 65, w: 130, h: 140 };
                this.townStoreRect = { x: 300, y: 195, w: 200, h: 160 };
                this.bedRect = { x: 290, y: 270, w: 220, h: 150 };

                canvas.addEventListener('mousedown', (e) => this.handleClick(e));
                canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                window.addEventListener('keydown', (e) => this.handleKeyDown(e));

                this.updateUI();
                this.gameLoop();
            }

            initGrid() {
                for (let r = 0; r < CONFIG.gridRows; r++) {
                    this.grid[r] = [];
                    for (let c = 0; c < CONFIG.gridCols; c++) {
                        const cell = {
                            watered: false,
                            crop: null,
                            growthDays: 0,
                            obstacle: null,
                            stickChar: ''
                        };

                        if (Math.random() < 0.45) {
                            const rand = Math.random();
                            if (rand < 0.25) {
                                cell.obstacle = 'rock_large';
                            } else if (rand < 0.5) {
                                cell.obstacle = 'rock_small';
                            } else if (rand < 0.75) {
                                cell.obstacle = 'log';
                            } else {
                                cell.obstacle = 'stick';
                                const stickChars = ['/', '\\', '|', '-', '_'];
                                cell.stickChar = stickChars[Math.floor(Math.random() * stickChars.length)];
                            }
                        }

                        this.grid[r][c] = cell;
                    }
                }
            }

            log(msg) {
                this.messages.push(msg);
                if (this.messages.length > 15) this.messages.shift();
                logEl.innerHTML = this.messages.slice().reverse().map(m => `<div>> ${m}</div>`).join('');
            }

            consumeEnergy(amount) {
                if (this.energy >= amount) {
                    this.energy -= amount;
                    this.updateUI();
                    return true;
                }
                this.log("Too tired! Sleep first.");
                return false;
            }

            updateUI() {
                document.getElementById('location-name').innerText = this.location.toUpperCase();
                document.getElementById('day-display').innerText = `DAY ${this.day}`;
                const cashSpan = document.getElementById('cash-display');
                if (cashSpan) cashSpan.innerText = this.cash;

                energyBarEl.style.width = `${(this.energy / CONFIG.energyMax) * 100}%`;

                const navL = document.getElementById('nav-left');
                const navR = document.getElementById('nav-right');
                const navD = document.getElementById('nav-down');
                const navU = document.getElementById('nav-up');

                navL.style.display = (this.location === 'town') ? 'flex' : 'none';
                navR.style.display = (this.location === 'farm') ? 'flex' : 'none';
                navD.style.display = (this.location === 'house' || this.location === 'store') ? 'flex' : 'none';
                navU.style.display = 'none';

                shopContainer.style.display = this.location === 'store' ? 'block' : 'none';
                if (this.location === 'store') this.renderShop();

                invEl.innerHTML = this.inventory.map((item, index) => {
                    const hotkeyNum = (index % 8) + 1;
                    return `
                <div class="inv-slot ${this.selectedItemIndex === index ? 'selected' : ''}" onclick="game.selectItem(${index})">
                    <div class="hotkey-hint">${hotkeyNum}</div>
                    <div>${item.name}</div>
                    ${item.type === 'seed' ? '<div>Seed</div>' : ''}
                    <div>${item.type === 'tool' ? '' : 'x' + item.count}</div>
                </div>
            `}).join('');
                invEl.style.transform = `translateY(-${this.inventoryScrollRow * 74}px)`;
            }

            scrollInventory(dir) {
                const itemsPerRow = 8;
                const totalRows = Math.ceil(this.inventory.length / itemsPerRow);
                if (totalRows <= 1) return;

                this.inventoryScrollRow += dir;
                if (this.inventoryScrollRow < 0) {
                    this.inventoryScrollRow = totalRows - 1;
                } else if (this.inventoryScrollRow >= totalRows) {
                    this.inventoryScrollRow = 0;
                }
                invEl.style.transform = `translateY(-${this.inventoryScrollRow * 74}px)`;
            }

            handleNav(dir) {
                if (this.location === 'farm' && dir === 'right') this.changeLocation('town');
                else if (this.location === 'town' && dir === 'left') this.changeLocation('farm');
                else if (this.location === 'house' && dir === 'down') this.changeLocation('farm');
                else if (this.location === 'store' && dir === 'down') this.changeLocation('town');
            }

            selectItem(index) {
                const item = this.inventory[index];
                if (item && item.type === 'harvested') {
                    const cropDef = CROPS[item.crop];
                    if (cropDef && cropDef.restoreEnergy) {
                        if (this.energy < CONFIG.energyMax) {
                            this.energy = Math.min(CONFIG.energyMax, this.energy + cropDef.restoreEnergy);
                            item.count--;
                            if (item.count <= 0) {
                                this.inventory.splice(index, 1);
                                if (this.selectedItemIndex >= this.inventory.length) {
                                    this.selectedItemIndex = Math.max(0, this.inventory.length - 1);
                                }
                            }
                            this.log(`Ate a ${cropDef.name}! (+${cropDef.restoreEnergy} energy)`);
                            this.updateUI();
                            return;
                        } else {
                            this.log("Energy is already full!");
                        }
                    }
                }

                if (this.selectedItemIndex === index) {
                    this.selectedItemIndex = -1;
                } else {
                    this.selectedItemIndex = index;
                }
                this.updateUI();
            }

            changeLocation(loc) {
                this.location = loc;
                this.updateUI();
            }

            handleMouseMove(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                this.mouseX = (e.clientX - rect.left) * scaleX;
                this.mouseY = (e.clientY - rect.top) * scaleY;
            }

            isHovering(rect) {
                return this.mouseX >= rect.x && this.mouseX <= rect.x + rect.w &&
                    this.mouseY >= rect.y && this.mouseY <= rect.y + rect.h;
            }

            drawHoverOutline(rect) {
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
                ctx.setLineDash([]);
            }

            handleKeyDown(e) {
                if (reportEl.style.display === 'block') return;

                if (e.key === 'Tab') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        this.scrollInventory(-1);
                    } else {
                        this.scrollInventory(1);
                    }
                    return;
                }

                const num = parseInt(e.key);
                if (!isNaN(num) && num >= 1 && num <= 8) {
                    const slotIndex = (num - 1) + (this.inventoryScrollRow * 8);
                    if (slotIndex < this.inventory.length) {
                        this.selectItem(slotIndex);
                    }
                }
            }

            handleClick(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;

                const activeItem = this.inventory[this.selectedItemIndex];

                if (this.location === 'farm') {
                    if (this.isHovering(this.farmHouseRect)) {
                        if (activeItem && activeItem.id === 'look') {
                            this.log("Your farm house. It looks cozy inside.");
                            return;
                        }
                        this.changeLocation('house');
                        return;
                    }

                    const col = Math.floor((x - CONFIG.offsetX) / CONFIG.cellSize);
                    const row = Math.floor((y - CONFIG.offsetY) / CONFIG.cellSize);

                    if (col >= 0 && col < CONFIG.gridCols && row >= 0 && row < CONFIG.gridRows) {
                        const cell = this.grid[row][col];

                        if (activeItem && activeItem.id === 'look') {
                            if (cell.obstacle) {
                                let desc = 'An obstacle.';
                                if (cell.obstacle === 'rock_large') desc = 'A large, heavy rock.';
                                else if (cell.obstacle === 'rock_small') desc = 'A small stone.';
                                else if (cell.obstacle === 'log') desc = 'A fallen log.';
                                else if (cell.obstacle === 'stick') desc = 'A wooden stick.';
                                this.log(`You see: ${desc}`);
                            } else if (cell.crop) {
                                const data = CROPS[cell.crop];
                                const progress = cell.growthDays / data.daysToGrow;
                                let desc = `A ${data.name.toLowerCase()} plant.`;
                                if (progress >= 1) desc += ' It is ready to harvest.';
                                else if (progress > 0.5) desc += ' It is growing well.';
                                else desc += ' It is just a seedling.';
                                if (!cell.watered) desc += ' It needs water.';
                                this.log(`You see: ${desc}`);
                            } else {
                                this.log(`You see: ${cell.watered ? 'Wet tilled soil.' : 'Dry soil. Needs water.'}`);
                            }
                            return;
                        }

                        if (cell.obstacle) {
                            if (!activeItem) return;
                            if (activeItem.id === 'pickaxe' && (cell.obstacle === 'rock_large' || cell.obstacle === 'rock_small')) {
                                if (this.consumeEnergy(5)) {
                                    this.addToInventory('stone');
                                    this.log('Mined 1 Stone!');
                                    if (cell.obstacle === 'rock_large') {
                                        cell.obstacle = 'rock_small';
                                    } else {
                                        cell.obstacle = null;
                                    }
                                    this.updateUI();
                                }
                                return;
                            }
                            if (activeItem.id === 'axe' && (cell.obstacle === 'log' || cell.obstacle === 'stick')) {
                                if (this.consumeEnergy(5)) {
                                    this.addToInventory('wood');
                                    this.log('Chopped 1 Wood!');
                                    if (cell.obstacle === 'log') {
                                        cell.obstacle = 'stick';
                                        const stickChars = ['/', '\\', '|', '-', '_'];
                                        cell.stickChar = stickChars[Math.floor(Math.random() * stickChars.length)];
                                    } else {
                                        cell.obstacle = null;
                                    }
                                    this.updateUI();
                                }
                                return;
                            }
                            if (activeItem.id !== 'watering_can') {
                                return;
                            }
                        }

                        if (cell.crop) {
                            const cropData = CROPS[cell.crop];
                            if (cell.growthDays >= cropData.daysToGrow) {
                                if (this.consumeEnergy(CONFIG.costHarvest)) {
                                    this.addToInventory(cell.crop);
                                    this.log(`Harvested ${cell.crop}!`);
                                    cell.crop = null;
                                    cell.growthDays = 0;
                                    this.updateUI();
                                }
                                return;
                            }
                        }

                        if (!activeItem) return;

                        if (activeItem.id === 'watering_can') {
                            if (!cell.watered) {
                                if (this.consumeEnergy(CONFIG.costWater)) {
                                    cell.watered = true;
                                    this.log(`Watered square [${col},${row}]`);
                                }
                            }
                        } else if (activeItem.type === 'seed' && activeItem.count > 0) {
                            if (!cell.crop) {
                                if (this.consumeEnergy(CONFIG.costPlant)) {
                                    cell.crop = activeItem.crop;
                                    cell.growthDays = 0;
                                    activeItem.count--;
                                    if (activeItem.count <= 0) {
                                        this.inventory.splice(this.selectedItemIndex, 1);
                                        this.selectedItemIndex = 1;
                                    }
                                    this.log(`Planted ${activeItem.crop}`);
                                    this.updateUI();
                                }
                            }
                        }
                    }
                } else if (this.location === 'town') {
                    if (this.isHovering(this.townStoreRect)) {
                        if (activeItem && activeItem.id === 'look') {
                            this.log("The General Store. A good place to buy seeds.");
                            return;
                        }
                        this.changeLocation('store');
                    }
                } else if (this.location === 'house') {
                    if (this.isHovering(this.bedRect)) {
                        if (activeItem && activeItem.id === 'look') {
                            this.log("Your bed. Sleep here to advance to the next day.");
                            return;
                        }
                        this.advanceDay();
                    }
                }
            }

            advanceDay() {
                this.location = 'farm';
                this.day++;
                this.energy = CONFIG.energyMax;

                let events = [];

                this.isRaining = Math.random() < 0.2;
                if (this.isRaining) events.push("It is raining today! No need to water.");

                if (Math.random() < 0.05) {
                    const crops = [];
                    for (let r = 0; r < CONFIG.gridRows; r++) {
                        for (let c = 0; c < CONFIG.gridCols; c++) {
                            if (this.grid[r][c].crop) crops.push(this.grid[r][c]);
                        }
                    }
                    if (crops.length > 0) {
                        const targetCropType = crops[Math.floor(Math.random() * crops.length)].crop;
                        const cropName = CROPS[targetCropType].name.toLowerCase();

                        for (let r = 0; r < CONFIG.gridRows; r++) {
                            for (let c = 0; c < CONFIG.gridCols; c++) {
                                if (this.grid[r][c].crop === targetCropType) {
                                    this.grid[r][c].crop = null;
                                    this.grid[r][c].growthDays = 0;
                                }
                            }
                        }
                        events.push(`A sudden ${cropName} blight has withered your crops...`);
                    }
                }

                for (let r = 0; r < CONFIG.gridRows; r++) {
                    for (let c = 0; c < CONFIG.gridCols; c++) {
                        const cell = this.grid[r][c];
                        if (this.isRaining) cell.watered = true;
                        if (cell.crop && cell.watered) {
                            cell.growthDays++;
                        }
                        cell.watered = false;
                    }
                }

                this.showReport(events);
                this.updateUI();
            }

            showReport(events) {
                reportEl.style.display = 'block';
                let content = `<p>Day ${this.day} has begun.</p>`;
                if (events.length > 0) {
                    content += "<ul>" + events.map(e => `<li>${e}</li>`).join('') + "</ul>";
                } else {
                    content += "<p>It's a beautiful, clear day.</p>";
                }
                reportContentEl.innerHTML = content;
            }

            closeReport() {
                reportEl.style.display = 'none';
            }

            addToInventory(cropKey) {
                const id = cropKey + '_produce';
                const existing = this.inventory.find(i => i.id === id);
                if (existing) {
                    existing.count++;
                } else {
                    this.inventory.push({ id, name: cropKey.toUpperCase(), type: 'harvested', crop: cropKey, count: 1 });
                }
            }

            renderShop() {
                const seedItemsHtml = Object.keys(CROPS).filter(k => CROPS[k].seedCost).map(key => `
                <div class="shop-item" style="display: flex; justify-content: space-between; align-items: center; cursor: default;" onclick="game.lookAtShopItem('${key}', 'seed')">
                    <span>${CROPS[key].name} Seed (${CROPS[key].daysToGrow}d)</span>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <span>$${CROPS[key].seedCost}</span>
                        <span class="ascii-btn" onclick="event.stopPropagation(); game.buySeed('${key}')">[BUY]</span>
                    </div>
                </div>
            `).join('');

                const inventoryItemsHtml = this.inventory.filter(i => i.type === 'harvested').map(item => `
                <div class="shop-item" style="display: flex; justify-content: space-between; align-items: center; cursor: default;" onclick="game.lookAtShopItem('${item.id}', 'harvested')">
                    <span>${item.name} (x${item.count})</span>
                    <div style="display: flex; gap: 5px; align-items: center; font-size: 14px;">
                        <span class="ascii-btn" onclick="event.stopPropagation(); game.sellCrop('${item.id}', 1)">[SELL 1 ($${CROPS[item.crop].value})]</span>
                        <span class="ascii-btn" onclick="event.stopPropagation(); game.sellCrop('${item.id}', 'half')">[SELL 1/2]</span>
                        <span class="ascii-btn" onclick="event.stopPropagation(); game.sellCrop('${item.id}', 'all')">[SELL ALL]</span>
                    </div>
                </div>
            `).join('');

                document.getElementById('shop-items').innerHTML = seedItemsHtml + inventoryItemsHtml || "No business today.";
            }

            lookAtShopItem(id, type) {
                const activeItem = this.inventory[this.selectedItemIndex];
                if (activeItem && activeItem.id === 'look') {
                    if (type === 'seed') {
                        const crop = CROPS[id];
                        this.log(`You see: A packet of ${crop.name} seeds. Takes ${crop.daysToGrow} days to grow. Restores ${crop.restoreEnergy} energy when eaten. Sells for $${crop.value}.`);
                    } else if (type === 'harvested') {
                        const item = this.inventory.find(i => i.id === id);
                        if (item) {
                            const crop = CROPS[item.crop];
                            this.log(`You see: Freshly harvested ${crop.name}. Sells for $${crop.value}.`);
                        }
                    }
                }
            }

            buySeed(key) {
                const cost = CROPS[key].seedCost;
                if (this.cash >= cost) {
                    this.cash -= cost;
                    const id = key + '_seed';
                    const existing = this.inventory.find(i => i.id === id);
                    if (existing) existing.count++;
                    else this.inventory.push({ id, name: CROPS[key].name, type: 'seed', crop: key, count: 1 });
                    this.log(`Bought ${key} seed`);
                    this.updateUI();
                } else {
                    this.log("Not enough cash!");
                }
            }

            sellCrop(itemId, amount) {
                const idx = this.inventory.findIndex(i => i.id === itemId);
                if (idx === -1) return;
                const item = this.inventory[idx];

                let qty = 1;
                if (amount === 'half') qty = Math.floor(item.count / 2) || 1;
                if (amount === 'all') qty = item.count;

                const profit = CROPS[item.crop].value * qty;
                this.cash += profit;

                item.count -= qty;
                if (item.count <= 0) {
                    this.inventory.splice(idx, 1);
                    if (this.selectedItemIndex >= this.inventory.length) {
                        this.selectedItemIndex = Math.max(0, this.inventory.length - 1);
                    }
                }

                this.log(`Sold ${qty}x ${item.name} for $${profit}`);
                this.updateUI();
            }

            draw() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (this.location === 'farm') {
                    ctx.fillStyle = '#fff';
                    ctx.font = '16px Courier New';
                    ctx.textAlign = 'center';
                    const houseAscii = [
                        "     /\\      ",
                        "    /  \\     ",
                        "   /____\\    ",
                        "  |  __  |   ",
                        "  | |  | |   ",
                        "  | |__| |   ",
                        "  |______|   "
                    ];
                    houseAscii.forEach((line, i) => {
                        ctx.fillText(line, 440, 70 + i * 18);
                    });

                    if (this.isHovering(this.farmHouseRect)) {
                        this.drawHoverOutline(this.farmHouseRect);
                    }

                    for (let r = 0; r < CONFIG.gridRows; r++) {
                        for (let c = 0; c < CONFIG.gridCols; c++) {
                            const cell = this.grid[r][c];
                            const x = CONFIG.offsetX + c * CONFIG.cellSize;
                            const y = CONFIG.offsetY + r * CONFIG.cellSize;

                            const isWet = cell.watered || this.isRaining;

                            ctx.fillStyle = isWet ? '#000' : '#fff';
                            ctx.fillRect(x, y, CONFIG.cellSize, CONFIG.cellSize);

                            ctx.strokeStyle = isWet ? '#fff' : '#000';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(x, y, CONFIG.cellSize, CONFIG.cellSize);

                            if (cell.obstacle) {
                                ctx.font = '30px Courier New';
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                ctx.fillStyle = isWet ? '#fff' : '#000';

                                let char = '';
                                if (cell.obstacle === 'rock_large') char = 'O';
                                else if (cell.obstacle === 'rock_small') char = 'o';
                                else if (cell.obstacle === 'log') char = 'I';
                                else if (cell.obstacle === 'stick') char = cell.stickChar;

                                ctx.fillText(char, x + CONFIG.cellSize / 2, y + CONFIG.cellSize / 2);
                            } else if (cell.crop) {
                                ctx.font = '30px Courier New';
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                ctx.fillStyle = isWet ? '#fff' : '#000';

                                const data = CROPS[cell.crop];
                                let char = data.seedChar;
                                const progress = cell.growthDays / data.daysToGrow;
                                if (progress > 0.5) char = data.midChar;
                                if (progress >= 1) char = data.endChar;

                                ctx.fillText(char, x + CONFIG.cellSize / 2, y + CONFIG.cellSize / 2);
                            }
                        }
                    }
                } else if (this.location === 'town') {
                    ctx.fillStyle = '#fff';
                    ctx.font = '24px Courier New';
                    ctx.textAlign = 'center';
                    ctx.fillText("MAIN STREET", 400, 100);

                    ctx.font = '18px Courier New';
                    const storeAscii = [
                        "    _________    ",
                        "   /         \\   ",
                        "  /  STORE    \\  ",
                        " |   _    _   | ",
                        " |  [ ]  [ ]  | ",
                        " |      _     | ",
                        " |_____| |____| "
                    ];
                    storeAscii.forEach((line, i) => {
                        ctx.fillText(line, 400, 200 + i * 20);
                    });

                    if (this.isHovering(this.townStoreRect)) {
                        this.drawHoverOutline(this.townStoreRect);
                    }



                } else if (this.location === 'store') {
                    ctx.fillStyle = '#fff';
                    ctx.font = '20px Courier New';
                    ctx.textAlign = 'center';
                    ctx.fillText("GENERAL STORE INTERIOR", 400, 80);

                    ctx.fillText("________________________", 400, 300);
                    ctx.fillText("|  [ SEEDS ]  [ TOOLS ] |", 400, 280);
                    ctx.fillText("|                       |", 400, 320);
                    ctx.fillText("|_______ ( o ) _________|", 400, 340);

                } else if (this.location === 'house') {
                    ctx.fillStyle = '#fff';
                    ctx.font = '20px Courier New';
                    ctx.textAlign = 'center';
                    ctx.fillText("INSIDE YOUR HOME", 400, 200);

                    if (this.isHovering(this.bedRect)) {
                        this.drawHoverOutline(this.bedRect);
                    }

                    const bed = [
                        "    _________________   ",
                        "   |#################|  ",
                        "   |#               #|  ",
                        "   |#      BED      #|  ",
                        "   |_________________|  ",
                        "   | |             | |  "
                    ];
                    bed.forEach((line, i) => {
                        ctx.fillText(line, 400, 300 + i * 20);
                    });
                }

                if (this.isRaining && (this.location === 'farm' || this.location === 'town')) {
                    ctx.fillStyle = '#fff';
                    for (let i = 0; i < 30; i++) {
                        ctx.fillText("|", Math.random() * 800, Math.random() * 600);
                    }
                }
            }

            gameLoop() {
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        const game = new Game();
    </script>
